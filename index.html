<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Matt Shade — Engineering & Design" />
    <title>Matt Shade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet" />
  </head>
  <body style="margin:0;background:#0a0a0b;color:#fafafa;font-family:system-ui,sans-serif;min-height:100vh">
    <!-- Netlify Forms: hidden form for deploy-time detection (React form submits via JS) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <div id="root">
      <main style="display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem">
        <div>
          <p style="margin:0 0 0.5rem;font-size:0.875rem;color:#22d3ee;letter-spacing:0.1em;text-transform:uppercase">Engineering &amp; Design</p>
          <h1 style="margin:0 0 1rem;font-size:clamp(2rem,6vw,3rem);font-weight:700">Matt Shade</h1>
          <p style="margin:0;color:#a1a1aa;max-width:480px">Creating and leading teams that craft AI-powered tools and interfaces to turn data into clarity and action.</p>
          <p style="margin:1.5rem 0 0;font-size:0.875rem;color:#71717a">Loading…</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
