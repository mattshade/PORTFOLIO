<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Failure Rate Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .kpi-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.25rem;
    }
    .kpi-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }
    .kpi-value {
      font-size: 1.75rem;
      font-weight: 700;
    }
    .kpi-value.good { color: #22c55e; }
    .kpi-value.warn { color: #eab308; }
    .kpi-value.bad { color: #ef4444; }
    .chart-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .chart-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #cbd5e1;
    }
    .chart-wrap { height: 260px; position: relative; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
      font-size: 0.8125rem;
      color: #94a3b8;
    }
    .legend span { display: flex; align-items: center; gap: 0.5rem; }
    .legend dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Change Failure Rate</h1>
    <p class="subtitle">DORA metric — deployments requiring remediation (mock data)</p>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">Current CFR</div>
        <div class="kpi-value good" id="cfr-current">8.2%</div>
        <div class="legend" style="margin-top:0.5rem"><span>Elite: &lt;15%</span></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total deploys (30d)</div>
        <div class="kpi-value">247</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Failed deploys</div>
        <div class="kpi-value warn">20</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg per week</div>
        <div class="kpi-value">~62</div>
      </div>
    </div>

    <div class="chart-card">
      <h2>Change Failure Rate by Week</h2>
      <div class="chart-wrap">
        <canvas id="cfrChart"></canvas>
      </div>
      <div class="legend">
        <span><dot style="background:#22d3ee"></dot> CFR %</span>
        <span>Target: &lt;15% (Elite)</span>
      </div>
    </div>

    <div class="chart-card">
      <h2>Deployments vs Failures</h2>
      <div class="chart-wrap">
        <canvas id="deployChart"></canvas>
      </div>
      <div class="legend">
        <span><dot style="background:#3b82f6"></dot> Deploys</span>
        <span><dot style="background:#ef4444"></dot> Failures</span>
      </div>
    </div>
  </div>

  <script>
    // Mock data — 12 weeks
    const labels = ['Wk 1', 'Wk 2', 'Wk 3', 'Wk 4', 'Wk 5', 'Wk 6', 'Wk 7', 'Wk 8', 'Wk 9', 'Wk 10', 'Wk 11', 'Wk 12'];
    const deploys = [58, 62, 55, 68, 61, 59, 64, 58, 62, 60, 65, 58];
    const failures = [4, 5, 6, 3, 7, 4, 5, 5, 4, 6, 3, 5];
    const cfrPct = deploys.map((d, i) => ((failures[i] / d) * 100).toFixed(1));

    const chartOpts = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
      },
      scales: {
        x: {
          grid: { color: 'rgba(148,163,184,0.15)' },
          ticks: { color: '#94a3b8' },
        },
        y: {
          grid: { color: 'rgba(148,163,184,0.15)' },
          ticks: { color: '#94a3b8' },
        },
      },
    };

    new Chart(document.getElementById('cfrChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'CFR %',
          data: cfrPct,
          borderColor: '#22d3ee',
          backgroundColor: 'rgba(34,211,238,0.1)',
          fill: true,
          tension: 0.3,
        }],
      },
      options: {
        ...chartOpts,
        scales: {
          ...chartOpts.scales,
          y: { ...chartOpts.scales.y, min: 0, max: 25 },
        },
      },
    });

    new Chart(document.getElementById('deployChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: 'Deploys',
            data: deploys,
            backgroundColor: 'rgba(59,130,246,0.7)',
          },
          {
            label: 'Failures',
            data: failures,
            backgroundColor: 'rgba(239,68,68,0.7)',
          },
        ],
      },
      options: {
        ...chartOpts,
        scales: {
          ...chartOpts.scales,
          x: { ...chartOpts.scales.x, stacked: false },
          y: { ...chartOpts.scales.y, stacked: false },
        },
      },
    });
  </script>
</body>
</html>
